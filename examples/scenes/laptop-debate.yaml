id: laptop-debate
title: 該買哪台筆電？
premise: |
  小美的 5 年老筆電壞了，預算 3 萬，下週要買。
  Steve 推 MacBook Air，Kevin 說自組桌機才是王道，Tux 堅持裝 Linux 的 ThinkPad。
  三個人越吵越兇，小美只想知道「能不能用 LINE 和 Excel」。
  Steve 剛買了 M4 MacBook Pro 很得意，Kevin 上週組了 8 萬水冷主機，Tux 昨天又把系統搞壞重裝了。
tone: heated-debate-with-comic-relief
opening_hook: "我筆電壞掉了啦，預算大概三萬，你們覺得我該買什麼？拜託不要吵架喔。"
